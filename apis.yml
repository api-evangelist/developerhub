aid: developerhub
name: DeveloperHub
description: >-
  DeveloperHub is a hosted developer documentation platform that enables teams
  to create beautiful API references, user guides, and knowledge bases. It
  features auto-generated API documentation from OpenAPI specifications,
  built-in versioning, full-text search, custom domains, and a WYSIWYG editor.
  DeveloperHub provides a complete developer portal solution with support for
  multiple documentation projects, custom branding, and SEO optimization.
